name: Supply Chain

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: supply-chain-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Scan repository
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Build image
        run: docker build --tag cautious-enigma:scan .
      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: cautious-enigma:scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Prepare artifact directory
        run: mkdir -p artifacts
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          image: cautious-enigma:scan
          format: spdx-json
          output-file: artifacts/sbom.spdx.json
          upload-artifact: false
      - uses: actions/upload-artifact@v7
        with:
          name: sbom-spdx
          path: artifacts/sbom.spdx.json
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: type=semver,pattern={{version}}
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - uses: sigstore/cosign-installer@v3
      - name: Sign release images
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          while IFS= read -r image; do
            cosign sign --yes "$image"
          done <<< "$TAGS"
