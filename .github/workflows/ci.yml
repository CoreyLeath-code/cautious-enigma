name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            Requirements.txt
            requirements-dev.txt
      - run: python -m pip install -r requirements-dev.txt
      - name: Static quality gates
        run: |
          ruff check app/api.py benchmarks tests/test_api.py tests/test_benchmark.py tests/test_model_registry.py src/utils/model_registry.py
          bandit -q -r app benchmarks src/utils/model_registry.py
          pip-audit -r Requirements.txt
      - name: Tests and coverage
        run: pytest
      - name: Reproducible benchmark
        run: python benchmarks/run_benchmark.py --rows 1000 --iterations 5 --warmup 1 --output artifacts/benchmark.json
      - uses: actions/upload-artifact@v7
        with:
          name: benchmark-and-coverage
          path: |
            artifacts/benchmark.json
            coverage.xml
          if-no-files-found: error

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality
    steps:
      - uses: actions/checkout@v7
      - run: docker build --tag cautious-enigma:${{ github.sha }} .
      - name: Verify non-root runtime and probes
        run: |
          test "$(docker run --rm cautious-enigma:${{ github.sha }} id -u)" = "10001"
          docker run -d --name api -p 8000:8000 cautious-enigma:${{ github.sha }}
          trap 'docker logs api; docker rm -f api' EXIT
          for attempt in {1..20}; do
            curl --fail --silent http://127.0.0.1:8000/health && exit 0
            sleep 2
          done
          exit 1

  deployment-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Validate Kubernetes schemas
        run: |
          docker run --rm -v "$PWD:/work" ghcr.io/yannh/kubeconform:v0.7.0             -strict -summary /work/deployment.yaml /work/service.yaml /work/network-policy.yaml
      - name: Enforce promotion controls
        shell: bash
        run: |
          ! grep -R "image:.*:latest" -- deployment.yaml docker-compose.yml
          grep -q "runAsNonRoot: true" deployment.yaml
          grep -q "readOnlyRootFilesystem: true" deployment.yaml
          grep -q 'drop: \["ALL"\]' deployment.yaml
          grep -q "automountServiceAccountToken: false" deployment.yaml
          grep -q "startupProbe:" deployment.yaml
          grep -q "livenessProbe:" deployment.yaml
          grep -q "readinessProbe:" deployment.yaml
